# ============================================================================
# Run 23: Higher LR (0.003) + stronger class weights + cosine annealing
# Hypothesis: Plateau scheduler too conservative. Cosine with warm restarts
# may escape local minimum. Heavier energy class weights to push recall.
# ============================================================================

model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_BASE
              patch_size: 4
              selector: ["encoder"]
        decoders:
          energy_segmentation:
            - class_path: rslearn.models.unet.UNetDecoder
              init_args:
                in_channels: [[4, 768]]
                out_channels: 3
                conv_layers_per_resolution: 2
                kernel_size: 3
                num_channels: {4: 512, 2: 256, 1: 128}
            - class_path: rslearn.train.tasks.segmentation.SegmentationHead
              init_args:
                weights: [0.1, 15.0, 20.0]
                dice_loss: true
    lr: 0.003
    plateau: false

data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: ./dataset
    inputs:
      sentinel2_l2a:
        data_type: "raster"
        layers:
          - "sentinel2_l2a"
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32

      label:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        dtype: INT32
        is_target: true

    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          energy_segmentation:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 3
              zero_is_invalid: false
              nodata_value: 255
              enable_accuracy_metric: true
              enable_f1_metric: true
              f1_metric_thresholds: [[0.5]]
              metric_kwargs:
                average: "micro"
        input_mapping:
          energy_segmentation:
            label: "targets"

    batch_size: 8
    num_workers: 4

    default_config:
      groups: ["ready"]
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
      crop_size: 128

    train_config:
      tags:
        split: "train"
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors:
              - sentinel2_l2a
              - target/energy_segmentation/classes
              - target/energy_segmentation/valid
        - class_path: rslearn.train.transforms.gaussian_noise.GaussianNoise
          init_args:
            selectors:
              - sentinel2_l2a
            std: 0.02

    val_config:
      tags:
        split: "val"
      crop_size: 128
      load_all_crops: true

    test_config:
      tags:
        split: "val"
      crop_size: 128
      load_all_crops: true

    predict_config:
      groups: ["predict"]
      crop_size: 128
      load_all_crops: true
      overlap_pixels: 16
      skip_targets: true

trainer:
  max_epochs: 40
  accelerator: auto
  devices: 1
  strategy: auto
  check_val_every_n_epoch: 2
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"

    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 999
        unfreeze_lr_factor: 10

    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: output
        selector: ["energy_segmentation"]
        merger:
          class_path: rslearn.train.prediction_writer.RasterMerger
          init_args:
            overlap_pixels: 16

    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_loss
        patience: 10
        mode: min

    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_loss
        mode: min

project_name: ${PROJECT_NAME}
run_name: ${RUN_NAME}
management_dir: ${MANAGEMENT_DIR}
log_mode: "no"
