# ============================================================================
# OpenEnergy-Engine: OlmoEarth fine-tune config (v3)
# Task: Energy infrastructure segmentation using EIA 860 labels
# Classes: 0=background 1=solar 2=wind 3=gas 4=coal 5=nuclear
#          6=hydro 7=oil 8=biomass 9=geothermal 10=storage
# Based on official olmoearth patterns: satlas_solar_farm + burn_scar tutorial
# ============================================================================

model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
          - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
            init_args:
              model_id: OLMOEARTH_V1_BASE
              patch_size: 8
              selector: ["encoder"]
        decoders:
          energy_segmentation:
            # Richer UNet decoder matching official satlas_solar_farm pattern
            - class_path: rslearn.models.unet.UNetDecoder
              init_args:
                in_channels: [[8, 768]]
                out_channels: 11
                conv_layers_per_resolution: 2
                kernel_size: 3
                num_channels: {8: 512, 4: 512, 2: 256, 1: 128}
            # Plain SegmentationHead (no custom weights/dice — matches official)
            - class_path: rslearn.train.tasks.segmentation.SegmentationHead
    # LR + Plateau scheduler (official pattern)
    lr: 0.0001
    plateau: true
    plateau_factor: 0.2
    plateau_patience: 2
    plateau_min_lr: 0
    plateau_cooldown: 10

data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: ./dataset
    inputs:
      sentinel2_l2a:
        data_type: "raster"
        layers:
          - "sentinel2_l2a"
        bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        passthrough: true
        dtype: FLOAT32

      label:
        data_type: "raster"
        layers: ["label_raster"]
        bands: ["label"]
        dtype: INT32
        is_target: true

    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          energy_segmentation:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 11
              zero_is_invalid: false
              nodata_value: 255
              enable_accuracy_metric: true
              enable_f1_metric: true
              f1_metric_thresholds: [[0.5]]
              metric_kwargs:
                average: "micro"
        input_mapping:
          energy_segmentation:
            label: "targets"

    batch_size: 8
    num_workers: 4

    default_config:
      groups: ["ready"]
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
      patch_size: 128

    train_config:
      tags:
        split: "train"
      transforms:
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12", "B01", "B09"]
        - class_path: rslearn.train.transforms.flip.Flip
          init_args:
            image_selectors:
              - sentinel2_l2a
              - target/energy_segmentation/classes
              - target/energy_segmentation/valid

    val_config:
      tags:
        split: "val"
      patch_size: 128
      load_all_patches: true

    test_config:
      tags:
        split: "val"
      patch_size: 128
      load_all_patches: true

    predict_config:
      groups: ["predict"]
      patch_size: 128
      load_all_patches: true
      overlap_ratio: 0.125
      skip_targets: true

trainer:
  max_epochs: 100
  accelerator: auto
  devices: 1
  strategy: auto
  check_val_every_n_epoch: 5
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: "epoch"

    # Freeze encoder for first 10 epochs, then unfreeze with 10x lower LR
    - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
      init_args:
        module_selector: ["model", "encoder", 0]
        unfreeze_at_epoch: 10
        unfreeze_lr_factor: 10

    # Write predictions back to dataset during `model predict`
    - class_path: rslearn.train.prediction_writer.RslearnWriter
      init_args:
        output_layer: output
        selector: ["energy_segmentation"]
        merger:
          class_path: rslearn.train.prediction_writer.RasterMerger
          init_args:
            padding: 8

    # Early stopping
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: val_loss
        patience: 15
        mode: min

    # Save best checkpoint based on validation loss
    - class_path: rslearn.train.callbacks.checkpointing.ManagedBestLastCheckpoint
      init_args:
        monitor: val_loss
        mode: min

project_name: ${PROJECT_NAME}
run_name: ${RUN_NAME}
management_dir: ${MANAGEMENT_DIR}
